name: PR Governance

on:
  pull_request_target:
    branches: [ "main" ]
    types: [ opened, edited, synchronize, reopened ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  governance:
    uses: PlatformUnityCI/cross-platform-guard/.github/workflows/pr-governance.yml@v1.2.0
