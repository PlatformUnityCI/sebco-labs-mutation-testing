name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
      inputs:
      qa_ref:
        description: 'QA repository branch (e.g. feat-branch) or tag (e.g. v1.0.0)'
        default: main
        required: true

env:
  QA_REPO: utech-red-qa

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        repository: https://github.com/PlatformUnityCI/tech-red-qa.git

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '21.6.2'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: v3.11
        architecture: 'x64'

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Checkout QA tests on workflow_dispatch
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        git clone -b ${{ inputs.qa_ref }} "git@github.com:Bancar/${{ env.QA_REPO }}" tests

    - name: Checkout QA tests on workflow_schedule
      if: ${{ github.event_name == 'schedule' }}
      run: git clone -b main "git@github.com:Bancar/${{ env.QA_REPO }}" tests

    - name: Checkout QA tests on Pull request
      if: ${{ github.event_name == 'pull_request' }}
      run: git clone -b ${{ github.head_ref }} "git@github.com:Bancar/${{ env.QA_REPO }}" tests

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Set up PYTHONPATH
      run: |
        echo "PYTHONPATH=$GITHUB_WORKSPACE/src" >> $GITHUB_ENV
        echo "::add-pat
