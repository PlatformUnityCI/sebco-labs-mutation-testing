name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      qa_ref:
        description: 'QA repository branch (e.g. feat-branch) or tag (e.g. v1.0.0)'
        default: main
        required: true

env:
  TECH_REPO: tech-red-qa

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository and install Git
      uses: actions/checkout@v2
      with:
        repository: PlatformUnityCI/tech-red-qa
        token: ${{ secrets.GITHUB_TOKEN }}
        ssh-strict: true
        persist-credentials: true
        clean: true
        fetch-depth: 1
        lfs: false
        submodules: false
        set-safe-directory: true

    - name: Install Git
      run: sudo apt-get install git

    - name: Add Git to PATH
      run: echo "PATH=\$PATH:/usr/bin" >> $GITHUB_ENV

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '21.6.2'
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: v3.11
        architecture: 'x64'

    - name: Set up PYTHONPATH
      run: |
        echo "PYTHONPATH=$GITHUB_WORKSPACE/src" >> $GITHUB_ENV
        echo "PATH=\$PATH:$GITHUB_WORKSPACE/src" >> $GITHUB_ENV

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Print environment info
      run: |
        echo "Current directory: $(pwd)"
        echo "PATH: $PATH"

    - name: Checkout QA tests
      run: git clone -b ${{ github.head_ref }} "git@github.com:PlatformUnityCI/${{ env.TECH_REPO }}" tests

    - name: Run tests
      timeout-minutes: 20
      run: pytest tests/
      working-directory: tests
      if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}

    - name: Run tests on workflow_schedule
      timeout-minutes: 20
      run: pytest tests/
      working-directory: tests
      if: ${{ github.event_name == 'schedule' }}