name: CLI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      branch:
        description: 'QA repo name'
        default: main
        required: true
      pytest_mark:
        description: 'QA mark to run tests'
        default: regression
        required: true

concurrency:
  group: qa-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  
jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:

      # Paso 1
      - name: Debug info
        run: |
          echo "GitHub event: ${{ github.event_name }}"
          echo "Head ref: ${{ github.head_ref }}"
          echo "Base ref: ${{ github.base_ref }}"

      # Paso 2
      - name: Checkout repository
        uses: actions/checkout@v5

      # Paso 3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.0
          architecture: 'x64'

      # Paso 4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # Paso 5
      - name: Install dependencies & requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -I

      # Paso 6
      - name: Configure Python Path
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      # Paso 7
      - name: Run tests
        timeout-minutes: 20
        run: |
          mkdir -p report
      
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pytest -m ${{ inputs.pytest_mark }} \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            pytest -m regression \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pytest -m regression \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            pytest -m regression \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          else
            echo "Event not supported"
          fi
        env:
          PYTEST_ADDOPTS: "--color=yes"

      # Paso 8
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: report/junit.xml
          
      # Paso 9
      - name: Generating html report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: report
          if-no-files-found: warn

  ai-review:
      runs-on: ubuntu-latest
      needs: build
      if: github.event_name == 'pull_request'
  
      steps:
        - name: Checkout repository
          uses: actions/checkout@v5
          with:
            fetch-depth: 0
  
        - name: Get PR diff
          run: |
            echo "Base ref: ${{ github.base_ref }}"
            echo "Head ref: ${{ github.head_ref }}"
    
            git fetch origin +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
    
            git diff origin/${{ github.base_ref }}...HEAD > pr.diff
    
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: 3.12.0
  
        - name: Install dependencies
          run: |
            pip install -r requirements.txt
            pip install openai requests
  
        - name: Run AI analysis
          run: |
            python lib_core/ai_review/analyze_pr.py pr.diff > review.md

        - name: Generate PR summary
          run: |
            python lib_core/ai_review/summarize_pr.py pr.diff > summary.md
          
        - name: Comment PR
          uses: actions/github-script@v7
          with:
            script: |
              const fs = require('fs');
              const body = fs.readFileSync('review.md', 'utf8');
  
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });

        - name: Update PR description
          uses: actions/github-script@v7
          with:
            script: |
              const fs = require('fs');
              const newSummary = fs.readFileSync('summary.md', 'utf8');
        
              const currentBody = context.payload.pull_request.body || '';
        
              const updatedBody = currentBody + "\n\n---\n\n" + newSummary;
        
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: updatedBody
              });
