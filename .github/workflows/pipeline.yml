name: CLI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      branch:
        description: 'QA repo name'
        default: main
        required: true
      pytest_mark:
        description: 'QA mark to run tests'
        default: regression
        required: true

concurrency:
  group: qa-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  
jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:

      # Paso 1
      - name: Debug info
        run: |
          echo "GitHub event: ${{ github.event_name }}"
          echo "Head ref: ${{ github.head_ref }}"
          echo "Base ref: ${{ github.base_ref }}"

      # Paso 2
      - name: Checkout repository
        uses: actions/checkout@v5

      # Paso 3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.0
          architecture: 'x64'

      # Paso 4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # Paso 5
      - name: Install dependencies & requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -I

      # Paso 6
      - name: Configure Python Path
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      # Paso 7
      - name: Run tests
        timeout-minutes: 20
        run: |
          mkdir -p report
      
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pytest -m ${{ inputs.pytest_mark }} \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            pytest -m regression \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pytest -m regression \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            pytest -m regression \
              --junitxml=report/junit.xml \
              --html=report/html-report.html \
              --self-contained-html
      
          else
            echo "Event not supported"
          fi
        env:
          PYTEST_ADDOPTS: "--color=yes"

      # Paso 8
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: report/junit.xml
          
      # Paso 9
      - name: Generating html report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: report
          if-no-files-found: warn

  ai-review:
    runs-on: ubuntu-latest
    needs: run-tests
    if: github.event_name == 'pull_request'
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
  
      - name: Get PR diff
        run: |
          echo "Base ref: ${{ github.base_ref }}"
          echo "Head ref: ${{ github.head_ref }}"
  
          git fetch origin +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.0
  
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
  
      # 🔥 SOLO UNA ejecución (JSON)
      - name: Generate inline comments JSON
        run: python lib_core/ai_review/analyze_pr.py pr.diff > comments.json
  
      - name: Generate PR summary
        run: python lib_core/ai_review/summarize_pr.py pr.diff > summary.md
  
      # 🧹 (opcional pero recomendable)
      - name: Clean previous bot comments
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
  
            for (const comment of comments.data) {
              if (comment.user.type === "Bot" && comment.body.includes("QA AI Review")) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
  
      # 🧾 Summary (esto ya lo tenías bien)
      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
  
            const newSummary = fs.readFileSync('summary.md', 'utf8');
            let currentBody = context.payload.pull_request.body || '';
  
            const start = '<!-- AI SUMMARY START -->';
            const end = '<!-- AI SUMMARY END -->';
  
            const regex = new RegExp(`${start}[\\s\\S]*?${end}`, 'g');
  
            if (regex.test(currentBody)) {
              currentBody = currentBody.replace(regex, newSummary);
            } else {
              currentBody = currentBody + "\n\n" + newSummary;
            }
  
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: currentBody
            });
  
      # 💥 INLINE COMMENTS (LA JOYA)
      - name: Post inline review comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
  
            const comments = JSON.parse(fs.readFileSync('comments.json', 'utf8'));
  
            if (comments.length === 0) {
              console.log("No comments to post");
              return;
            }
  
            const commit_id = context.payload.pull_request.head.sha;
  
            const reviewComments = comments.map(c => ({
              path: c.path,
              line: c.line,
              body: c.body
            }));
  
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              commit_id: commit_id,
              event: "COMMENT",
              comments: reviewComments
            });
