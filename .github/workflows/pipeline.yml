name: Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'QA repo name'
        default: main
        required: true
      pytest_mark:
        description: 'QA mark to run tests'
        default: regression
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Obtener el contenido del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.X
          architecture: 'x64'

      # Paso 3: Configuración de la caché de Python
      - name: Cache Python requirements
        uses: actions/cache@v3
        with:
          path: venv # Caché del entorno virtual
          key: ${{ runner.os }}-python-${{ hashFiles('./tests/requirements.txt') }}

      # Paso 4: Pip update and venv activation
      - name: Set up and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: tests

      # Paso 5: Instalar el proyecto
      - name: Install Project
        run: |
          venv/bin/python -m pip install -e .

      # Paso 6: Configurar la variable de entorno PythonPath
      - name: Configure Python Path
        run: echo "PYTHONPATH=${{ github.workspace }}/lib_core" >> $GITHUB_ENV

      # Paso 7: Ejecutar las pruebas con Pytest
      - name: Run tests
        timeout-minutes: 20
        run: |
          source venv/bin/activate
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            venv/bin/pytest -m ${{ inputs.pytest_mark }}
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            venv/bin/pytest -m regression
        working-directory: tests
        env:
          PYTEST_ADDOPTS: "--color=yes"

      # Paso 8: Subir reporte
      - name: Generating html report artifact
        if: always()
        uses: actions/upload-artifact@v4 # Update to the latest stable version
        with:
          name: test-report
          path: tests/report
          if-no-files-found: warn