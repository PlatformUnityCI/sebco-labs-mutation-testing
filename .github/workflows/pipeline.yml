name: Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'QA repo name'
        default: main
        required: true
      pytest_mark:
        description: 'QA mark to run tests'
        default: regression
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Obtener el contenido del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.X
          architecture: 'x64'

      # Paso 3: Instalar las dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Paso 4: Configurar la variable de entorno PythonPath
      - name: Configure Python Path
        run: echo "PYTHONPATH=${{ github.workspace }}/lib_core" >> $GITHUB_ENV

      # Paso 5: Instalar el proyecto
      - name: Install Project
        run: |
          python -m pip install -e .

      # Paso 6: Ejecutar las pruebas con Pytest
      - name: Run tests
        run: |
          source venv/bin/activate # Activar entorno virtual
          pytest -m ${{ inputs.pytest_mark }}
        working-directory: tests
        env:
          PYTEST_ADDOPTS: "--color=yes"
      
      - name: Generating html report artifact
        if: always()
        uses: actions/upload-artifact@v4 # Update to the latest stable version
        with:
          name: test-report
          path: tests/report
          if-no-files-found: warn