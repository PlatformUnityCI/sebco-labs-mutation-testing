name: CLI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      branch:
        description: 'QA repo name'
        default: main
        required: true
      pytest_mark:
        description: 'QA mark to run tests'
        default: regression
        required: true
      run_mutation:
        description: 'Run mutation testing'
        default: 'true'
        required: true

concurrency:
  group: qa-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Debug info
        run: |
          echo "GitHub event: ${{ github.event_name }}"
          echo "Head ref: ${{ github.head_ref }}"
          echo "Base ref: ${{ github.base_ref }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -I

      - name: Configure Python Path
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run tests
        run: |
          mkdir -p report
          PYTEST_MARK="${{ github.event.inputs.pytest_mark || 'regression' }}"
          pytest -m "$PYTEST_MARK" \
            --junitxml=report/junit.xml \
            --html=report/html-report.html \
            --self-contained-html

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: report/junit.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: report

  mutation:
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mutation == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -I

      - name: Configure Python Path
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run mutation testing
        run: |
          mkdir -p mutation-report
          mutmut run | tee mutation-report/mutmut-run.txt

      - name: Collect mutation results
        if: always()
        run: |
          {
            echo "=== mutmut results ==="
            mutmut results || true
            echo
            echo "=== surviving mutants details ==="
            mutmut results --all || true
          } | tee mutation-report/mutmut-results.txt

      - name: Calculate mutation score
        if: always()
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          run_file = Path("mutation-report/mutmut-run.txt")
          text = run_file.read_text(encoding="utf-8", errors="ignore")

          clean = re.sub(r'\x1b\[[0-9;]*[A-Za-z]', '', text)

          matches = re.findall(r'🎉\s*(\d+).*?🙁\s*(\d+)', clean, flags=re.DOTALL)
          if not matches:
              killed = 0
              survived = 0
          else:
              killed, survived = map(int, matches[-1])

          total = killed + survived
          score = round((killed / total) * 100, 2) if total else 0.0

          summary_lines = [
              "## Mutation Testing Summary",
              "",
              "| Metric | Value |",
              "|---|---:|",
              f"| Mutation Score | **{score}%** |",
              f"| Killed | **{killed}** |",
              f"| Survived | **{survived}** |",
              f"| Total evaluated | **{total}** |",
          ]

          report_dir = Path("mutation-report")
          report_dir.mkdir(parents=True, exist_ok=True)

          with open(report_dir / "mutation-score.txt", "w", encoding="utf-8") as f:
              f.write(f"score={score}\n")
              f.write(f"killed={killed}\n")
              f.write(f"survived={survived}\n")
              f.write(f"total={total}\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"mutation_score={score}\n")
              f.write(f"mutation_killed={killed}\n")
              f.write(f"mutation_survived={survived}\n")
              f.write(f"mutation_total={total}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("\n".join(summary_lines) + "\n")
          PY

      - name: Print mutation score
        if: always()
        run: cat mutation-report/mutation-score.txt

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutation-report

  qa-engine:
    if: github.event_name == 'pull_request'
    needs: build
    uses: PlatformUnityCI/cross-platform-guard/.github/workflows/ai-review.yml@main
    with:
      language: python
    secrets:
      CROSS_PLATFORM_GUARD_TOKEN: ${{ secrets.CROSS_PLATFORM_GUARD_TOKEN }}